<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #04040a;
    color: #d6e4ef;
    font-family: "Noto Sans JP", sans-serif;
    overflow: hidden;
    position: relative;
  }
  .bg {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(120deg, rgba(4, 4, 10, 0.88), rgba(4, 4, 10, 0.68)),
      url("https://images.unsplash.com/photo-1563089145-599997674d42?w=1200&q=75&auto=format&fit=crop") center / cover no-repeat;
    filter: saturate(1.3);
  }
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.25) 0 1px, transparent 1px 4px);
  }
  .frame {
    position: absolute;
    inset: 30px;
    border: 1px solid rgba(0, 240, 255, 0.35);
    clip-path: polygon(0 0, calc(100% - 40px) 0, 100% 40px, 100% 100%, 40px 100%, 0 calc(100% - 40px));
  }
  .corner {
    position: absolute;
    font-family: "JetBrains Mono", monospace;
    font-size: 16px;
    letter-spacing: 3px;
    color: rgba(0, 240, 255, 0.7);
  }
  .corner--tl { top: 52px; left: 64px; }
  .corner--br { bottom: 52px; right: 64px; color: rgba(255, 43, 214, 0.8); }
  .content {
    position: relative;
    height: 100%;
    padding: 0 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 21px;
    letter-spacing: 5px;
    color: #fcee0a;
    text-shadow: 0 0 14px rgba(252, 238, 10, 0.6);
    margin-bottom: 34px;
  }
  h1 {
    font-family: "Orbitron", sans-serif;
    font-size: 104px;
    font-weight: 900;
    letter-spacing: 4px;
    line-height: 1.08;
    color: #fff;
    text-shadow:
      3px 0 0 rgba(255, 43, 214, 0.8),
      -3px 0 0 rgba(0, 240, 255, 0.8),
      0 0 40px rgba(0, 240, 255, 0.4);
    margin-bottom: 38px;
  }
  .lead {
    font-size: 40px;
    font-weight: 900;
    line-height: 1.45;
    color: #fff;
    margin-bottom: 22px;
  }
  .lead .magenta {
    color: #ff2bd6;
    text-shadow: 0 0 16px rgba(255, 43, 214, 0.7);
  }
  .sub {
    font-family: "JetBrains Mono", monospace;
    font-size: 22px;
    letter-spacing: 2px;
    color: #00f0ff;
    text-shadow: 0 0 12px rgba(0, 240, 255, 0.6);
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="scanlines"></div>
  <div class="frame"></div>
  <p class="corner corner--tl">&gt; NEW_FRONTIER_MODEL</p>
  <p class="corner corner--br">fable5-lp.netlify.app</p>
  <div class="content">
    <p class="eyebrow">[ SYS://claude-fable-5 ]</p>
    <h1>CLAUDE<br>FABLE&nbsp;5</h1>
    <p class="lead">Mythosクラスの知性を、<span class="magenta">すべての人へ。</span></p>
    <p class="sub">長時間自律タスク × 永続メモリ × 最先端ビジョン</p>
  </div>
</body>
</html>
